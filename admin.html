<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Immortality Index</title>
  <style>
    :root {
      --bg: #050810; --bg2: #0b0f1e; --bg3: #111827;
      --border: #1e2d45; --border2: #2a3f5f;
      --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
      --accent: #06b6d4; --purple: #8b5cf6;
      --green: #10b981; --red: #ef4444; --boss: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header {
      background: linear-gradient(135deg,#0a0e1f,#0d1629);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
    }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .logo h1 { font-size: 20px; font-weight: 700; background: linear-gradient(90deg,var(--accent),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo p { font-size: 11px; color: var(--text3); margin-top: 2px; }
    #auth-section { display: flex; gap: 8px; align-items: center; }
    #auth-section input { background: var(--bg2); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; }
    #auth-section input:focus { border-color: var(--accent); }
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; transition: all 0.2s; font-weight: 600; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #22d3ee; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 5px; border: none; cursor: pointer; }
    .btn-scan { background: rgba(6,182,212,0.15); color: var(--accent); border: 1px solid rgba(6,182,212,0.3); }
    .btn-scan:hover { background: rgba(6,182,212,0.25); }

    #login-panel {
      max-width: 400px; margin: 80px auto; padding: 32px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; text-align: center;
    }
    #login-panel h2 { margin-bottom: 8px; font-size: 18px; }
    #login-panel p { color: var(--text3); font-size: 13px; margin-bottom: 24px; }
    #login-form { display: flex; flex-direction: column; gap: 10px; }
    #login-form input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
    #login-form input:focus { border-color: var(--accent); }
    #login-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; }

    #admin-panel { display: none; max-width: 1200px; margin: 32px auto 60px; padding: 0 24px; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .admin-header h2 { font-size: 16px; font-weight: 700; color: var(--text2); }
    .admin-actions { display: flex; gap: 8px; align-items: center; }
    .scan-status { font-size: 12px; color: var(--text3); }
    /* Scan progress panel */
    #scan-progress { display:none; margin:0 0 24px; background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px 24px; }
    .scan-prog-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .scan-prog-title { font-size:13px; font-weight:700; color:var(--accent); }
    .scan-prog-status { font-size:11px; color:var(--text3); }
    .scan-prog-bar-wrap { background:var(--bg3); border-radius:99px; height:6px; margin-bottom:14px; overflow:hidden; }
    .scan-prog-bar { height:6px; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--purple)); transition:width 0.5s ease; width:0%; }
    .scan-prog-current { font-size:12px; color:var(--text2); margin-bottom:12px; }
    .scan-prog-stats { display:flex; gap:20px; font-size:11px; color:var(--text3); margin-bottom:14px; }
    .scan-prog-stats span b { color:var(--text); }
    .scan-log { max-height:140px; overflow-y:auto; font-size:11px; font-family:monospace; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:8px 10px; display:flex; flex-direction:column; gap:2px; }
    .log-achieved { color:var(--green); }
    .log-not { color:var(--text3); }
    .log-error { color:var(--red); }


    .obstacles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
    @media (max-width: 900px) { .obstacles-grid { grid-template-columns: 1fr; } }

    .obs-admin-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    }
    .obs-admin-card.boss-card { border-color: rgba(249,115,22,0.4); }
    .obs-card-head {
      padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .obs-card-head:hover { background: rgba(255,255,255,0.02); }
    .obs-id { font-size: 10px; font-weight: 700; color: var(--text3); min-width: 32px; }
    .obs-name { flex: 1; font-size: 13px; font-weight: 600; }
    .boss-badge { font-size: 9px; font-weight: 700; color: var(--boss); background: rgba(249,115,22,0.12); border: 1px solid rgba(249,115,22,0.3); border-radius: 4px; padding: 2px 6px; }
    .obs-pct { font-size: 12px; font-weight: 700; color: var(--accent); }
    .genetics-col .obs-pct { color: var(--accent); }
    .nanotech-col .obs-pct { color: var(--purple); }
    .chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
    .obs-admin-card.open .chevron { transform: rotate(180deg); }

    .obs-card-body { display: none; padding: 14px; }
    .obs-admin-card.open .obs-card-body { display: block; }

    .milestones-admin { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .milestone-admin-row {
      display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 7px;
      transition: border-color 0.2s;
    }
    .milestone-admin-row.done { background: rgba(16,185,129,0.05); border-color: rgba(16,185,129,0.2); }
    .toggle-wrap { flex-shrink: 0; margin-top: 2px; }
    .toggle {
      width: 32px; height: 18px; border-radius: 9px; background: var(--border2);
      border: none; cursor: pointer; position: relative; transition: background 0.2s;
    }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%; background: white; transition: transform 0.2s;
    }
    .toggle.on { background: var(--green); }
    .toggle.on::after { transform: translateX(14px); }
    .ms-num { font-size: 10px; color: var(--text3); min-width: 18px; margin-top: 2px; flex-shrink: 0; }
    .ms-text { flex: 1; }
    .ms-name { font-size: 12px; color: var(--text2); line-height: 1.4; }
    .milestone-admin-row.done .ms-name { color: var(--green); }
    .ms-evidence-input {
      width: 100%; margin-top: 4px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 5px;
      color: var(--text2); font-size: 11px; padding: 4px 8px; outline: none;
    }
    .ms-evidence-input:focus { border-color: var(--accent); }
    .ms-evidence-input::placeholder { color: var(--text3); font-style: italic; }

    .save-btn { display: block; width: 100%; padding: 8px; background: var(--accent); color: #000; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .save-btn:hover { background: #22d3ee; }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .save-feedback { font-size: 11px; color: var(--green); text-align: center; margin-top: 4px; min-height: 14px; }

    .loading-state { text-align: center; padding: 60px; color: var(--text3); }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <h1>⚡ Immortality Index — Admin</h1>
      <p>Milestone Management Panel</p>
    </div>
    <div id="auth-section">
      <span id="user-email" style="font-size:12px;color:var(--text3)"></span>
      <button class="btn btn-ghost" id="logout-btn" style="display:none" onclick="doLogout()">Log Out</button>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div id="login-panel">
  <h2>Admin Login</h2>
  <p>Authorised users only</p>
  <div id="login-form">
    <input type="email" id="email-input" placeholder="Email" autocomplete="username" />
    <input type="password" id="pass-input" placeholder="Password" autocomplete="current-password" />
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
  </div>
  <div id="login-error"></div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <h2>Obstacle Management</h2>
    <div class="admin-actions">
      <span class="scan-status" id="scan-status"></span>
      <button class="btn btn-sm btn-scan" id="scan-btn" onclick="triggerScan()">▶ Trigger AI Scan</button>
    </div>
  </div>

  <!-- Scan progress panel -->
  <div id="scan-progress">
    <div class="scan-prog-header">
      <span class="scan-prog-title">🔬 AI Scan in Progress</span>
      <span class="scan-prog-status" id="prog-status-text"></span>
    </div>
    <div class="scan-prog-bar-wrap"><div class="scan-prog-bar" id="prog-bar"></div></div>
    <div class="scan-prog-current" id="prog-current">Initialising...</div>
    <div class="scan-prog-stats">
      <span>Obstacles: <b><span id="prog-obs">0</span> / <span id="prog-obs-total">0</span></b></span>
      <span>Milestones scanned: <b><span id="prog-ms">0</span> / <span id="prog-ms-total">0</span></b></span>
      <span>Updated: <b><span id="prog-updated">0</span></b></span>
    </div>
    <div class="scan-log" id="scan-log"></div>
  </div>
  <div class="obstacles-grid">
    <div id="genetics-admin">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:12px">Track 01 · Genetics</div>
      <div class="loading-state"><div class="spinner"></div>Loading...</div>
    </div>
    <div id="nanotech-admin">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:12px">Track 02 · Nanotech</div>
      <div class="loading-state"><div class="spinner"></div>Loading...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, onSnapshot, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const app = initializeApp({
    apiKey: "AIzaSyBCyaJFe9jDuBHcf3fcKkgvfjPdi1pN0dM",
    authDomain: "immortality-index.firebaseapp.com",
    projectId: "immortality-index",
    storageBucket: "immortality-index.firebasestorage.app",
    messagingSenderId: "202572480694",
    appId: "1:202572480694:web:1d0ae36f8bb68106cc6617"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ── AUTH ─────────────────────────────────────────────────
  window.doLogin = async () => {
    const email = document.getElementById('email-input').value.trim();
    const pass = document.getElementById('pass-input').value;
    document.getElementById('login-error').textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      document.getElementById('login-error').textContent = e.message;
    }
  };
  window.doLogout = () => signOut(auth);

  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      document.getElementById('user-email').textContent = user.email;
      document.getElementById('logout-btn').style.display = 'inline-flex';
      loadObstacles();
    } else {
      document.getElementById('login-panel').style.display = 'block';
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'none';
    }
  });


  // ── SCAN ─────────────────────────────────────────────────
  const WORKER = 'https://immortality-index-scanner.immortalityindex.workers.dev';

  window.triggerScan = async () => {
    const btn = document.getElementById('scan-btn');
    const statusEl = document.getElementById('scan-status');
    btn.disabled = true;
    btn.textContent = '⏳ Starting...';
    statusEl.textContent = '';

    const progPanel = document.getElementById('scan-progress');
    const progBar   = document.getElementById('prog-bar');
    const progCur   = document.getElementById('prog-current');
    const progObs   = document.getElementById('prog-obs');
    const progObsT  = document.getElementById('prog-obs-total');
    const progMs    = document.getElementById('prog-ms');
    const progMsT   = document.getElementById('prog-ms-total');
    const progUpd   = document.getElementById('prog-updated');
    const progStat  = document.getElementById('prog-status-text');
    const logEl     = document.getElementById('scan-log');

    try {
      const user = auth.currentUser;
      let token = await user.getIdToken(true);
      const authHeaders = () => ({ 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' });

      // Fetch obstacle list from Worker
      const listR = await fetch(WORKER + '/obstacles', { headers: authHeaders() });
      if (!listR.ok) {
        statusEl.textContent = '✗ Scan failed to start: ' + listR.status;
        statusEl.style.color = 'var(--red)';
        btn.disabled = false; btn.textContent = '▶ Trigger AI Scan';
        return;
      }
      const { obstacles } = await listR.json();
      const totalMilestones = obstacles.reduce((s, o) => s + o.total, 0);

      progPanel.style.display = 'block';
      logEl.innerHTML = '';
      progObsT.textContent = obstacles.length;
      progMsT.textContent  = totalMilestones;
      btn.textContent = '⏳ Scanning...';
      progCur.textContent = 'Initialising...';

      let milestonesScanned = 0, milestonesUpdated = 0;

      for (let i = 0; i < obstacles.length; i++) {
        const obs = obstacles[i];
        progObs.textContent = i + 1;
        progCur.textContent = 'Scanning: ' + obs.name;
        const pct = totalMilestones ? Math.round(milestonesScanned / totalMilestones * 100) : 0;
        progBar.style.width = pct + '%';
        progStat.textContent = pct + '%';

        if (i > 0) await new Promise(r => setTimeout(r, 10000));

        // Refresh token for long-running scans
        token = await user.getIdToken();

        try {
          const r = await fetch(WORKER + '/scan', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ obstacleId: obs.id })
          });
          const result = await r.json();

          if (!r.ok) throw new Error(result.error || ('HTTP ' + r.status));

          milestonesScanned += result.scanned || 0;
          milestonesUpdated += result.confirmed || 0;
          progMs.textContent  = milestonesScanned;
          progUpd.textContent = milestonesUpdated;

          const t = new Date().toISOString().slice(11, 19);
          const entry = document.createElement('div');
          if (result.error) {
            entry.className = 'log-error';
            entry.textContent = '[' + t + '] ' + obs.name + ' — ERROR: ' + result.error;
          } else if (result.skipped) {
            entry.className = 'log-not';
            entry.textContent = '[' + t + '] · ' + obs.name + ' — all done, skipped';
          } else if ((result.confirmed || 0) > 0) {
            entry.className = 'log-achieved';
            entry.textContent = '[' + t + '] ✓ ' + obs.name + ' — ' + result.confirmed + '/' + result.scanned + ' confirmed';
          } else {
            entry.className = 'log-not';
            entry.textContent = '[' + t + '] · ' + obs.name + ' — ' + (result.scanned || 0) + ' scanned, none confirmed';
          }
          logEl.appendChild(entry);
          logEl.scrollTop = logEl.scrollHeight;
        } catch (e) {
          const t = new Date().toISOString().slice(11, 19);
          const entry = document.createElement('div');
          entry.className = 'log-error';
          entry.textContent = '[' + t + '] ' + obs.name + ' — ERROR: ' + e.message;
          logEl.appendChild(entry);
          logEl.scrollTop = logEl.scrollHeight;
        }
      }

      // Done
      progBar.style.width = '100%';
      progObs.textContent = obstacles.length;
      progMs.textContent  = milestonesScanned;
      progCur.textContent = '✓ Complete — ' + milestonesUpdated + ' milestone(s) newly confirmed';
      progStat.textContent = new Date().toLocaleTimeString();
      statusEl.textContent = 'Last scan: ' + milestonesUpdated + ' updated';
      statusEl.style.color = 'var(--green)';
      btn.disabled = false;
      btn.textContent = '▶ Trigger AI Scan';

    } catch (e) {
      statusEl.textContent = '✗ ' + e.message;
      statusEl.style.color = 'var(--red)';
      btn.disabled = false;
      btn.textContent = '▶ Trigger AI Scan';
    }
  };

  // ── OBSTACLES ────────────────────────────────────────────
  let allDocs = {};

  function loadObstacles() {
    onSnapshot(collection(db, 'obstacles'), snap => {
      snap.docs.forEach(d => { allDocs[d.id] = { ...d.data(), id: d.id }; });
      renderAdmin();
    });
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function calcPct(milestones) {
    if (!milestones?.length) return 0;
    const done = milestones.filter(m => m.completed).length;
    return Math.round(done / milestones.length * 100);
  }

  function renderObsCard(obs, colClass) {
    const pct = calcPct(obs.milestones);
    const cardId = 'adm-' + obs.id;
    const idLabel = obs.id.replace('g-','G').replace('n-','N').replace('-','.');
    const milestoneRows = (obs.milestones||[]).map((m, i) => `
      <div class="milestone-admin-row ${m.completed ? 'done' : ''}" id="ms-row-${obs.id}-${i}">
        <div class="toggle-wrap">
          <button class="toggle ${m.completed ? 'on' : ''}" onclick="toggleMilestone('${obs.id}', ${i})" title="${m.completed ? 'Mark incomplete' : 'Mark complete'}"></button>
        </div>
        <div class="ms-num">${i+1}.</div>
        <div class="ms-text">
          <div class="ms-name">${escHtml(m.name)}</div>
          <input class="ms-evidence-input" id="ev-${obs.id}-${i}" type="text" placeholder="Evidence / citation (optional)" value="${escHtml(m.evidence||'')}" />
        </div>
      </div>`).join('');

    return `
      <div class="obs-admin-card ${obs.isBoss ? 'boss-card' : ''}" id="${cardId}">
        <div class="obs-card-head" onclick="document.getElementById('${cardId}').classList.toggle('open')">
          <div class="obs-id">${idLabel}</div>
          <div class="obs-name ${colClass}">${escHtml(obs.name)}${obs.isBoss ? ' <span class="boss-badge">Boss Hurdle</span>' : ''}</div>
          <div class="obs-pct ${colClass}">${pct}%</div>
          <span class="chevron">▼</span>
        </div>
        <div class="obs-card-body">
          <div class="milestones-admin">${milestoneRows}</div>
          <button class="save-btn" onclick="saveObstacle('${obs.id}')">Save Changes</button>
          <div class="save-feedback" id="save-fb-${obs.id}"></div>
        </div>
      </div>`;
  }

  function renderAdmin() {
    const obs = Object.values(allDocs);
    const genetics = obs.filter(o => o.track === 'genetics').sort((a,b) => a.order - b.order);
    const nanotech = obs.filter(o => o.track === 'nanotech').sort((a,b) => a.order - b.order);

    function renderCol(list, colId, colClass) {
      const label = colId === 'genetics-admin' ? 'Track 01 · Genetics' : 'Track 02 · Nanotech';
      let html = `<div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:12px">${label}</div>`;
      let lastPhase = null;
      list.forEach(o => {
        const ph = o.phaseLabel || ('Phase ' + o.phase);
        if (ph !== lastPhase) {
          html += `<div style="font-size:10px;font-weight:600;letter-spacing:0.8px;color:var(--text3);text-transform:uppercase;padding:10px 2px 4px;border-top:1px solid var(--border);margin-top:6px">${escHtml(ph)}</div>`;
          lastPhase = ph;
        }
        html += renderObsCard(o, colClass);
      });
      document.getElementById(colId).innerHTML = html;
    }

    renderCol(genetics, 'genetics-admin', 'genetics-col');
    renderCol(nanotech, 'nanotech-admin', 'nanotech-col');
  }

  // ── TOGGLE MILESTONE ─────────────────────────────────────
  window.toggleMilestone = (obsId, idx) => {
    const obs = allDocs[obsId];
    if (!obs) return;
    obs.milestones[idx].completed = !obs.milestones[idx].completed;
    // Update button and row UI immediately
    const row = document.getElementById(`ms-row-${obsId}-${idx}`);
    const btn = row?.querySelector('.toggle');
    const done = obs.milestones[idx].completed;
    btn?.classList.toggle('on', done);
    row?.classList.toggle('done', done);
    // Update the obs-admin-card pct
    const card = document.getElementById('adm-' + obsId);
    if (card) {
      const pctEl = card.querySelector('.obs-pct');
      if (pctEl) pctEl.textContent = calcPct(obs.milestones) + '%';
    }
  };

  // ── SAVE OBSTACLE ─────────────────────────────────────────
  window.saveObstacle = async (obsId) => {
    const obs = allDocs[obsId];
    if (!obs) return;
    const fb = document.getElementById('save-fb-' + obsId);
    const btn = document.querySelector(`#adm-${obsId} .save-btn`);
    btn.disabled = true;
    btn.textContent = 'Saving...';
    fb.textContent = '';

    // Collect evidence values from inputs
    obs.milestones.forEach((m, i) => {
      const inp = document.getElementById(`ev-${obsId}-${i}`);
      if (inp) m.evidence = inp.value.trim();
    });

    try {
      await updateDoc(doc(db, 'obstacles', obsId), {
        milestones: obs.milestones,
        lastUpdated: new Date().toISOString()
      });
      fb.textContent = '✓ Saved';
      fb.style.color = 'var(--green)';
      setTimeout(() => { fb.textContent = ''; }, 3000);
    } catch(e) {
      fb.textContent = '✗ Error: ' + e.message;
      fb.style.color = 'var(--red)';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  };
</script>
</body>
</html>
