name: Daily AI Scan

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AI Scan
        run: |
          curl -X POST "${{ secrets.SITE_URL }}/api/scan" \
            -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            --fail \
            --silent \
            --show-error \
            --max-time 60
        # Note: background function returns 202 immediately; actual scan runs async
