name: Convert OG images SVG to PNG

on:
  push:
    paths:
      - 'docs/images/*.svg'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin

      - name: Convert any new SVGs to PNG
        run: |
          for svg in docs/images/*.svg; do
            png="${svg%.svg}.png"
            if [ ! -f "$png" ]; then
              rsvg-convert -w 1200 -h 628 "$svg" -o "$png"
              echo "Converted: $svg → $png"
            fi
          done

      - name: Commit and push PNGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/images/*.png
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Auto-convert SVG to PNG"
          git pull --rebase origin main
          git push origin main
