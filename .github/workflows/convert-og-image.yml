name: Convert OG images SVG to PNG

on:
  push:
    paths:
      - 'docs/images/*.svg'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin

      - name: Convert any new SVGs to PNG
        run: |
          converted=0
          for svg in docs/images/*.svg; do
            png="${svg%.svg}.png"
            if [ ! -f "$png" ]; then
              rsvg-convert -w 1200 -h 628 "$svg" -o "$png"
              echo "Converted: $svg → $png"
              converted=$((converted+1))
            fi
          done
          echo "Total converted: $converted"

      - name: Commit new PNGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-convert new OG image SVGs to PNG"
          file_pattern: docs/images/*.png
