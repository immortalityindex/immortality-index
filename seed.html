function doSignIn() {
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  var statusEl = document.getElementById('status');
  statusEl.innerHTML = '<span class="info">Signing inГўВЂВ¦</span>';
  auth.signInWithEmailAndPassword(email, pass)
    .then(function() { statusEl.innerHTML = ''; })
    .catch(function(e) { statusEl.innerHTML = '<span class="err">Error: ' + e.message + '</span>'; });
}

function doSignOut() {
  auth.signOut();
}

async function seedFirestore() {
  const btn      = document.getElementById('seed-btn');
  const statusEl = document.getElementById('seed-status');
  const progBar  = document.getElementById('prog-bar');
  const progFill = document.getElementById('prog-fill');
  btn.disabled = true;
  progBar.style.display = 'block';
  statusEl.innerHTML = '<span class=\'info\'>Reading existing dataГўВЂВ¦</span>';

  try {
    // Read all existing docs first so we can preserve progress
    const snaps = await Promise.all(
      OBSTACLES.map(o => db.collection('obstacles').doc(o.id).get())
    );

    const batch = db.batch();
    OBSTACLES.forEach((obs, i) => {
      const ref    = db.collection('obstacles').doc(obs.id);
      const prev   = snaps[i].exists ? snaps[i].data() : null;
      const merged = { ...obs };

      if (prev) {
        // Preserve milestone completion state
        merged.milestones = obs.milestones.map(m => {
          const old = (prev.milestones || []).find(pm => pm.id === m.id);
          return old ? { ...m, completed: old.completed, evidence: old.evidence } : m;
        });
        // Preserve papers
}

      batch.set(ref, merged);
      progFill.style.width = Math.round((i + 1) / OBSTACLES.length * 100) + '%';
    });

    statusEl.innerHTML = '<span class=\'info\'>WritingГўВЂВ¦</span>';
    await batch.commit();
    progFill.style.width = '100%';
    statusEl.innerHTML =
      '<span class=\'ok\'>&#10003; ' + OBSTACLES.length +
      ' obstacles written ГўВЂВ” progress preserved!</span>';
  } catch (e) {
    statusEl.innerHTML = '<span class=\'err\'>&#10007; ' + e.message + '</span>';
  } finally {
    btn.disabled = false;
  }
}
</script>
